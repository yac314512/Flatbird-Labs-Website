<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="2600" viewBox="0 0 1600 2600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="2600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06131B"/>
      <stop offset="1" stop-color="#091E2B"/>
    </linearGradient>
    <linearGradient id="cta" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#00D1B2"/>
      <stop offset="1" stop-color="#2C9FFF"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="2600" fill="url(#bg)"/>
  <rect width="1600" height="86" fill="#071019"/>
  <rect y="85" width="1600" height="1" fill="#1E3A4A"/>
  <text x="115" y="55" fill="#ECFFFC" font-size="36" font-family="Arial Black, Arial">FLATBIRD LABS</text>
  <text x="980" y="55" fill="#A8C5D1" font-size="20" font-family="Arial">Our Approach</text>
  <text x="1140" y="55" fill="#A8C5D1" font-size="20" font-family="Arial">What We Build</text>
  <text x="1320" y="55" fill="#A8C5D1" font-size="20" font-family="Arial">Who We Work With</text>

  <text x="115" y="170" fill="#5DE2D1" font-size="18" letter-spacing="2.4" font-family="Arial" font-weight="700">BUILT BY OPERATORS. NOT CONSULTANTS.</text>
  <text x="115" y="262" fill="#F2FDFF" font-size="72" font-family="Arial Black, Arial">We've made the expensive</text>
  <text x="115" y="340" fill="#F2FDFF" font-size="72" font-family="Arial Black, Arial">mistakes so you don't have to.</text>
  <text x="115" y="394" fill="#F2FDFF" font-size="30" font-family="Arial" font-weight="700">We know which levers actually move the number. We've pulled them.</text>
  <text x="115" y="450" fill="#A8C5D1" font-size="24" font-family="Arial">Flatbird Labs was built by former Fortune 500 CMOs who have sat on your side</text>
  <text x="115" y="484" fill="#A8C5D1" font-size="24" font-family="Arial">of the table - managing hundreds of millions in marketing spend and delivering</text>
  <text x="115" y="518" fill="#A8C5D1" font-size="24" font-family="Arial">growth when the board was watching.</text>

  <rect x="115" y="566" rx="34" width="360" height="72" fill="url(#cta)"/>
  <text x="160" y="612" fill="#02131A" font-size="26" font-family="Arial" font-weight="700">Tell Us Where You Want to Grow</text>
  <rect x="495" y="566" rx="34" width="250" height="72" fill="#0F2534" stroke="#2F5B73"/>
  <text x="553" y="612" fill="#D9EFF8" font-size="24" font-family="Arial" font-weight="700">See How We Work</text>

  <rect x="960" y="176" rx="18" width="510" height="360" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="995" y="230" fill="#ECFFFF" font-size="36" font-family="Arial Black, Arial">What experienced operators</text>
  <text x="995" y="272" fill="#ECFFFF" font-size="36" font-family="Arial Black, Arial">see first</text>
  <text x="995" y="328" fill="#A8C5D1" font-size="22" font-family="Arial">- Traffic, conversion, and retention issues</text>
  <text x="995" y="360" fill="#A8C5D1" font-size="22" font-family="Arial">- Waste hides in attribution and slow systems</text>
  <text x="995" y="392" fill="#A8C5D1" font-size="22" font-family="Arial">- The right system moves revenue in 90 days</text>
  <text x="995" y="424" fill="#A8C5D1" font-size="22" font-family="Arial">- Decks do not fix the real constraint</text>

  <rect x="115" y="700" rx="18" width="1350" height="118" fill="#081825" stroke="#2A4E63"/>
  <text x="145" y="742" fill="#8DE6DA" font-size="15" letter-spacing="2" font-family="Arial" font-weight="700">WHERE WE'VE SAT IN THE ROOM</text>
  <rect x="145" y="770" rx="20" width="150" height="34" fill="#0B1F2C" stroke="#2F5B73"/><text x="187" y="793" fill="#ECFFFF" font-size="18" font-family="Arial">Walmart</text>
  <rect x="310" y="770" rx="20" width="180" height="34" fill="#0B1F2C" stroke="#2F5B73"/><text x="348" y="793" fill="#ECFFFF" font-size="18" font-family="Arial">Dollar General</text>
  <rect x="505" y="770" rx="20" width="140" height="34" fill="#0B1F2C" stroke="#2F5B73"/><text x="551" y="793" fill="#ECFFFF" font-size="18" font-family="Arial">Lidl US</text>
  <rect x="660" y="770" rx="20" width="150" height="34" fill="#0B1F2C" stroke="#2F5B73"/><text x="700" y="793" fill="#ECFFFF" font-size="18" font-family="Arial">Wells Fargo</text>
  <rect x="825" y="770" rx="20" width="120" height="34" fill="#0B1F2C" stroke="#2F5B73"/><text x="858" y="793" fill="#ECFFFF" font-size="18" font-family="Arial">Citibank</text>

  <text x="115" y="930" fill="#5DE2D1" font-size="18" letter-spacing="2.4" font-family="Arial" font-weight="700">OUR APPROACH</text>
  <text x="115" y="1002" fill="#F2FDFF" font-size="58" font-family="Arial Black, Arial">Most CMOs are solving the wrong problem.</text>
  <text x="115" y="1058" fill="#A8C5D1" font-size="24" font-family="Arial">They think they have a traffic problem when they have a conversion problem.</text>
  <text x="115" y="1092" fill="#A8C5D1" font-size="24" font-family="Arial">We diagnose whether the real constraint is Traffic, Conversion, or Retention.</text>
  <text x="115" y="1126" fill="#A8C5D1" font-size="24" font-family="Arial">Then we build the system to fix it - tied to a revenue outcome in 90 days.</text>

  <rect x="930" y="950" rx="18" width="535" height="340" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="965" y="1002" fill="#8DE6DA" font-size="15" letter-spacing="2" font-family="Arial" font-weight="700">THE THREE PROBLEMS WE SOLVE</text>
  <rect x="965" y="1036" rx="14" width="465" height="70" fill="#102635" stroke="#2F5B73"/>
  <text x="995" y="1078" fill="#ECFFFF" font-size="24" font-family="Arial Black, Arial">Show Up</text>
  <rect x="965" y="1120" rx="14" width="465" height="70" fill="#102635" stroke="#2F5B73"/>
  <text x="995" y="1162" fill="#ECFFFF" font-size="24" font-family="Arial Black, Arial">Buy</text>
  <rect x="965" y="1204" rx="14" width="465" height="70" fill="#102635" stroke="#2F5B73"/>
  <text x="995" y="1246" fill="#ECFFFF" font-size="24" font-family="Arial Black, Arial">Keep</text>

  <rect x="0" y="1360" width="1600" height="470" fill="#08151F"/>
  <text x="115" y="1436" fill="#5DE2D1" font-size="18" letter-spacing="2.4" font-family="Arial" font-weight="700">WHAT WE BUILD</text>
  <text x="115" y="1506" fill="#F2FDFF" font-size="56" font-family="Arial Black, Arial">We don't hand you a deck. We build the system.</text>
  <rect x="115" y="1548" rx="16" width="650" height="110" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="145" y="1594" fill="#ECFFFF" font-size="28" font-family="Arial Black, Arial">Growth Diagnostic</text>
  <rect x="835" y="1548" rx="16" width="650" height="110" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="865" y="1594" fill="#ECFFFF" font-size="28" font-family="Arial Black, Arial">Revenue Attribution System</text>
  <rect x="115" y="1680" rx="16" width="650" height="110" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="145" y="1726" fill="#ECFFFF" font-size="28" font-family="Arial Black, Arial">Customer Acquisition Engine</text>
  <rect x="835" y="1680" rx="16" width="650" height="110" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="865" y="1726" fill="#ECFFFF" font-size="28" font-family="Arial Black, Arial">Personalization &amp; Loyalty Infrastructure</text>

  <text x="115" y="1928" fill="#5DE2D1" font-size="18" letter-spacing="2.4" font-family="Arial" font-weight="700">HOW IT WORKS</text>
  <text x="115" y="1994" fill="#F2FDFF" font-size="52" font-family="Arial Black, Arial">90 days from diagnosis to a working system.</text>
  <rect x="115" y="2036" rx="16" width="420" height="116" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="145" y="2070" fill="#8DE6DA" font-size="16" font-family="Arial" font-weight="700">STEP 1 - DIAGNOSE</text>
  <text x="145" y="2112" fill="#ECFFFF" font-size="26" font-family="Arial Black, Arial">Find the Real Problem</text>
  <rect x="590" y="2036" rx="16" width="420" height="116" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="620" y="2070" fill="#8DE6DA" font-size="16" font-family="Arial" font-weight="700">STEP 2 - BLUEPRINT</text>
  <text x="620" y="2112" fill="#ECFFFF" font-size="26" font-family="Arial Black, Arial">Build the Growth Plan</text>
  <rect x="1065" y="2036" rx="16" width="420" height="116" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="1095" y="2070" fill="#8DE6DA" font-size="16" font-family="Arial" font-weight="700">STEP 3 - BUILD</text>
  <text x="1095" y="2112" fill="#ECFFFF" font-size="26" font-family="Arial Black, Arial">Construct the System</text>

  <rect x="115" y="2208" rx="16" width="650" height="180" fill="#0A1E2A" stroke="#2A4E63"/>
  <text x="145" y="2250" fill="#5DE2D1" font-size="16" font-family="Arial" font-weight="700">WHO WE ARE</text>
  <text x="145" y="2294" fill="#ECFFFF" font-size="32" font-family="Arial Black, Arial">Operators who lived the problem.</text>
  <text x="145" y="2334" fill="#A8C5D1" font-size="20" font-family="Arial">Founded by Michael Bossio and Patrick Hook, with experience across Walmart,</text>
  <text x="145" y="2364" fill="#A8C5D1" font-size="20" font-family="Arial">Dollar General, Lidl US, Wells Fargo, and Citibank.</text>

  <rect x="835" y="2208" rx="16" width="650" height="180" fill="#08151F" stroke="#2A4E63"/>
  <text x="865" y="2250" fill="#5DE2D1" font-size="16" font-family="Arial" font-weight="700">START A CONVERSATION</text>
  <text x="865" y="2294" fill="#F2FDFF" font-size="32" font-family="Arial Black, Arial">Tell us where you want to grow.</text>
  <text x="865" y="2334" fill="#A8C5D1" font-size="20" font-family="Arial">We'll come back with a real point of view.</text>
</svg>
